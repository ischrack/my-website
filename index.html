<style>
  :root { --accent: #3fb950; --t-mono: 'JetBrains Mono', monospace; --t-body: 'DM Sans', sans-serif; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body.viewport-desktop, html:has(body.viewport-desktop) { overflow: hidden; }
  body { background: #070b12; font-family: var(--t-body); }
  #root { width: 100%; height: 100%; }
  body.viewport-mobile, body.viewport-tablet { overflow: auto; -webkit-overflow-scrolling: touch; }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.35;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #21262d; border-radius: 3px; }
  @keyframes dock-bounce {
    0%,100% { transform: translateY(0) scale(var(--ds,1)); }
    30% { transform: translateY(-14px) scale(var(--ds,1)); }
    60% { transform: translateY(-6px) scale(var(--ds,1)); }
  }
  @keyframes dock-wiggle {
    0%,100% { transform: scale(1); }
    25% { transform: scale(1.08) rotate(-3deg); }
    75% { transform: scale(1.08) rotate(3deg); }

<script type="text/babel" src="Mobile.jsx"></script>
<script type="text/babel" src="Tablet.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#e3b341",
  "desktopBg": "space"
}/*EDITMODE-END*/;

/* ── CLOCK ─── */
function Clock() {
  const [t, setT] = useState(new Date());
  useEffect(() => { const iv = setInterval(() => setT(new Date()), 1000); return () => clearInterval(iv); }, []);
  const p = n => String(n).padStart(2,'0');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const mos = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return <span style={{ fontFamily:'var(--t-mono)', fontSize:'12px', color:'rgba(200,210,220,0.7)', letterSpacing:'0.03em' }}>{days[t.getDay()]} {mos[t.getMonth()]} {t.getDate()} &nbsp;{p(t.getHours())}:{p(t.getMinutes())}:{p(t.getSeconds())}</span>;
}

/* ── MENU BAR ─── */
function MenuBar({ winStates, onOpen, onFocus }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const fn = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, []);

  const items = [
    { id:'terminal',     label:'Terminal',      icon:'⌨', desc:'About & Expertise' },
    { id:'publications', label:'Publications',  icon:'📄', desc:'CV & Publications' },
    { id:'contact',      label:'Contact',       icon:'✉',  desc:'Get in touch' },
    { id:'__sep__' },
    { id:'coming',       label:'More coming soon…', icon:'⋯', disabled:true },
  ];

  const handle = (id) => {
    setOpen(false);
    if (!id || id === '__sep__' || id === 'coming') return;
    const s = winStates[id];
    if (s === 'open') onFocus(id);
    else onOpen(id);
  };

  return (
    <div style={{ position:'fixed', top:0, left:0, right:0, height:'28px', background:'rgba(8,12,20,0.9)', backdropFilter:'blur(20px)', borderBottom:'1px solid rgba(255,255,255,0.07)', display:'flex', alignItems:'center', padding:'0 12px', zIndex:10000, userSelect:'none' }}>
      {/* Logo */}
      <div style={{ marginRight:'6px', display:'flex', alignItems:'center' }}>
        <svg viewBox="0 0 18 18" width="15" height="15">
          <rect x="1" y="1" width="6" height="6" fill="var(--accent)" opacity="0.85"/>
          <rect x="9" y="1" width="6" height="6" fill="var(--accent)" opacity="0.45"/>
          <rect x="1" y="9" width="6" height="6" fill="var(--accent)" opacity="0.45"/>
          <rect x="9" y="9" width="6" height="6" fill="var(--accent)" opacity="0.2"/>
        </svg>
      </div>

      <div ref={ref} style={{ position:'relative' }}>
        <button onClick={() => setOpen(o => !o)} style={{ background: open ? 'rgba(255,255,255,0.1)' : 'transparent', border:'none', cursor:'pointer', fontFamily:'var(--t-mono)', fontSize:'12px', color: open ? '#fff' : 'rgba(200,210,220,0.85)', padding:'3px 10px', borderRadius:'4px', letterSpacing:'0.03em', fontWeight:500 }}>Sections</button>
        {open && (
          <div style={{ position:'absolute', top:'26px', left:0, background:'rgba(20,25,34,0.97)', backdropFilter:'blur(24px)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:'8px', minWidth:'220px', boxShadow:'0 16px 48px rgba(0,0,0,0.7)', padding:'6px 0', overflow:'hidden', zIndex:20000 }}>
            {items.map((item, i) => item.id === '__sep__'
              ? <div key={i} style={{ height:'1px', background:'rgba(255,255,255,0.07)', margin:'4px 0' }}/>
              : (
              <div key={item.id} onClick={() => !item.disabled && handle(item.id)}
                style={{ display:'flex', alignItems:'center', gap:'12px', padding:'8px 14px', cursor: item.disabled ? 'default' : 'pointer', opacity: item.disabled ? 0.4 : 1, transition:'background 0.1s' }}
                onMouseEnter={e => { if (!item.disabled) e.currentTarget.style.background = 'rgba(63,185,80,0.12)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; }}>
                <span style={{ fontSize:'14px', width:'20px', textAlign:'center' }}>{item.icon}</span>
                <div>
                  <div style={{ fontFamily:'var(--t-mono)', fontSize:'12px', color: winStates[item.id] === 'open' ? 'var(--accent)' : '#c9d1d9' }}>
                    {item.label}
                    {winStates[item.id] === 'open' && <span style={{ marginLeft:'6px', fontSize:'8px', color:'var(--accent)' }}>●</span>}
                    {winStates[item.id] === 'docked' && <span style={{ marginLeft:'6px', fontSize:'8px', color:'#febc2e' }}>–</span>}
                  </div>
                  {item.desc && <div style={{ fontFamily:'var(--t-body)', fontSize:'10px', color:'#4a5568', marginTop:'1px' }}>{item.desc}</div>}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{ flex:1 }}/>
      <Clock/>
    </div>
  );
}

/* ── DOCK ─── */
const DOCK_APPS = [
  { id:'terminal',     label:'Terminal',     isTerminal:true,
    Icon: () => (
      <svg viewBox="0 0 44 44" width="44" height="44">

        <text x="8" y="24" fill="#3fb950" fontFamily="'JetBrains Mono',monospace" fontSize="11" fontWeight="500">$_</text>

        <rect x="10" y="8" width="24" height="28" rx="2" fill="white" fillOpacity="0.95"/>
        <line x1="14" y1="16" x2="30" y2="16" stroke="#1e6bb8" strokeWidth="1.5" strokeLinecap="round"/>
        <line x1="14" y1="21" x2="30" y2="21" stroke="#1e6bb8" strokeWidth="1" strokeOpacity="0.5" strokeLinecap="round"/>
        <line x1="14" y1="25" x2="26" y2="25" stroke="#1e6bb8" strokeWidth="1" strokeOpacity="0.5" strokeLinecap="round"/>
        <line x1="14" y1="29" x2="28" y2="29" stroke="#1e6bb8" strokeWidth="1" strokeOpacity="0.3" strokeLinecap="round"/>
      </svg>

  },
  { id:'contact',      label:'Contact',      isTerminal:true,
    Icon: () => (
      <svg viewBox="0 0 44 44" width="44" height="44">
        <rect x="0" y="0" width="44" height="44" rx="10" fill="url(#cg)"/>
        <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#262c36"/><stop offset="1" stopColor="#1c2128"/></linearGradient></defs>
        <rect x="8" y="13" width="28" height="18" rx="3" fill="none" stroke="#3fb950" strokeWidth="1.5" strokeOpacity="0.7"/>
        <polyline points="8,14 22,24 36,14" fill="none" stroke="#3fb950" strokeWidth="1.5" strokeOpacity="0.7"/>
      </svg>
    )
  },
];

function Dock({ winStates, onOpen, onFocus, onRestore }) {
  const [mouseX, setMouseX] = useState(null);
  const dockRef = useRef(null);
  const ICON_SIZE = 52;
  const ICON_GAP = 12;
  const MAX_SCALE = 1.55;
  const RADIUS = 90;

  const getScale = (idx) => {
    if (mouseX === null || !dockRef.current) return 1;
    const dockRect = dockRef.current.getBoundingClientRect();
    const iconX = dockRect.left + idx * (ICON_SIZE + ICON_GAP) + ICON_SIZE / 2;
    const dist = Math.abs(mouseX - iconX);
    if (dist > RADIUS) return 1;
    return 1 + (MAX_SCALE - 1) * Math.pow(Math.cos((dist / RADIUS) * Math.PI / 2), 1.5);
  };

  const handleClick = (id) => {
    const s = winStates[id];
    if (s === 'open') onFocus(id);
    else if (s === 'docked') onRestore(id);
    else onOpen(id);
  };

  return (
    <div style={{ position:'fixed', bottom:'12px', left:'50%', transform:'translateX(-50%)', zIndex:9000, display:'flex', flexDirection:'column', alignItems:'center', gap:'4px' }}>
      {/* Dock shelf */}
      <div ref={dockRef}
        onMouseMove={e => setMouseX(e.clientX)}
        onMouseLeave={() => setMouseX(null)}
        style={{ display:'flex', alignItems:'flex-end', gap:`${ICON_GAP}px`, padding:'8px 16px 6px', background:'rgba(255,255,255,0.12)', backdropFilter:'blur(24px) saturate(1.5)', border:'1px solid rgba(255,255,255,0.18)', borderRadius:'18px', boxShadow:'0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15)' }}>
        {DOCK_APPS.map((app, idx) => {
          const scale = getScale(idx);
          const state = winStates[app.id] || 'closed';
          return (
            <div key={app.id} data-dock-id={app.id} onClick={() => handleClick(app.id)}
              style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'4px', cursor:'pointer', transition:'transform 0.1s ease-out', transform:`scale(${scale})`, transformOrigin:'bottom center' }}>
              <div style={{ width:`${ICON_SIZE}px`, height:`${ICON_SIZE}px`, position:'relative',
                animation: state === 'closed' ? 'none' : (state === 'docked' ? 'dock-wiggle 0.5s ease' : 'none'),
                filter: state === 'open' ? 'drop-shadow(0 0 8px rgba(63,185,80,0.4))' : 'none',
                transition:'filter 0.2s',
              }}>
                <app.Icon/>
                {/* Dot indicator */}
                {state === 'open' && (
                  <div style={{ position:'absolute', bottom:'-6px', left:'50%', transform:'translateX(-50%)', width:'4px', height:'4px', borderRadius:'50%', background:'rgba(255,255,255,0.8)' }}/>
                )}
                {state === 'docked' && (
                  <div style={{ position:'absolute', bottom:'-6px', left:'50%', transform:'translateX(-50%)', width:'4px', height:'4px', borderRadius:'50%', background:'rgba(254,188,46,0.9)' }}/>
                )}
              </div>
            </div>
          );
        })}

        {/* Separator */}
        <div style={{ width:'1px', height:'36px', background:'rgba(255,255,255,0.15)', margin:'0 4px', alignSelf:'center' }}/>

        {/* GitHub icon */}
        <a href="https://github.com/ischrack" target="_blank" rel="noopener"
          style={{ cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:'4px', textDecoration:'none', transition:'transform 0.1s ease-out', transform:`scale(${getScale(DOCK_APPS.length + 1)})`, transformOrigin:'bottom center' }}>
          <div style={{ width:`${ICON_SIZE}px`, height:`${ICON_SIZE}px` }}>
            <svg viewBox="0 0 44 44" width="44" height="44">
              <rect x="0" y="0" width="44" height="44" rx="10" fill="#24292e"/>
              <path d="M22 10C15.37 10 10 15.37 10 22c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.05.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.65.25 2.87.12 3.17.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.21.7.82.58C30.56 31.8 34 27.3 34 22c0-6.63-5.37-12-12-12z" fill="white" fillOpacity="0.9"/>
            </svg>
          </div>
        </a>
      </div>

      {/* Labels row — shown on hover via parent */}
      <div style={{ display:'flex', gap:`${ICON_GAP}px`, padding:'0 16px', pointerEvents:'none', opacity: mouseX !== null ? 1 : 0, transition:'opacity 0.15s' }}>
        {DOCK_APPS.map((app) => (
          <div key={app.id} style={{ width:`${ICON_SIZE}px`, textAlign:'center', fontFamily:'var(--t-body)', fontSize:'11px', color:'rgba(220,228,236,0.8)', whiteSpace:'nowrap', textShadow:'0 1px 3px rgba(0,0,0,0.8)' }}>{app.label}</div>
        ))}
        <div style={{ width:'1px', margin:'0 4px' }}/>
        <div style={{ width:`${ICON_SIZE}px`, textAlign:'center', fontFamily:'var(--t-body)', fontSize:'11px', color:'rgba(220,228,236,0.8)', whiteSpace:'nowrap', textShadow:'0 1px 3px rgba(0,0,0,0.8)' }}>GitHub</div>
      </div>
    </div>
  );
}

/* ── DESKTOP BG ─── */
function DesktopBg() {
  return (
    <div style={{ position:'fixed', inset:0, zIndex:0 }}>
      <img
        src="uploads/a22adf5f-3d6c-488c-b166-f1b8e4b701f7.jpg"

        style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }}

/* ── TWEAKS ─── */
function TweaksPanel({ tweaks, setTweaks, visible }) {
  const ACCENTS = [{ l:'green', v:'#3fb950' }, { l:'blue', v:'#58a6ff' }, { l:'amber', v:'#e3b341' }, { l:'violet', v:'#d2a8ff' }];
  const upd = (k, v) => {
    const n = { ...tweaks, [k]: v };
    setTweaks(n);
    if (k === 'accent') document.documentElement.style.setProperty('--accent', v);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits: n }, '*');
  };
  return (
    <div style={{ position:'fixed', bottom:'100px', right:'24px', background:'#161b22', border:'1px solid #30363d', padding:'18px', width:'196px', zIndex:11000, fontFamily:'var(--t-mono)', fontSize:'12px', opacity: visible ? 1 : 0, pointerEvents: visible ? 'all' : 'none', transform: visible ? 'translateY(0)' : 'translateY(10px)', transition:'opacity 0.2s, transform 0.2s', borderRadius:'8px' }}>
      <div style={{ color:'var(--accent)', marginBottom:'14px', letterSpacing:'0.1em' }}>Tweaks</div>
      <div style={{ marginBottom:'12px' }}>
        <div style={{ color:'#4a5568', fontSize:'10px', marginBottom:'7px' }}>accent color</div>
        <div style={{ display:'flex', gap:'7px' }}>
          {ACCENTS.map(a => <button key={a.l} onClick={() => upd('accent', a.v)} title={a.l} style={{ width:'22px', height:'22px', background:a.v, border: tweaks.accent === a.v ? '2px solid #fff' : '2px solid transparent', cursor:'pointer' }}/>)}
        </div>
      </div>
    </div>
  );
}

/* ── APP ─── */
const WIN_CONFIGS = {
  terminal:     { title:'ian_schrack', subtitle:'— bash',    width:'820px', height:'640px', isTerminal:true },
  publications: { title:'Publications.pdf', subtitle:'— Preview', width:'720px', height:'680px', isTerminal:false },
  contact:      { title:'contact.sh',  subtitle:'— bash',   width:'520px', height:'580px', isTerminal:true },
};

function getInitPos(id) {
  const W = window.innerWidth, H = window.innerHeight;
  if (id === 'terminal')     return { x: Math.round(W * 0.08), y: 50 };
  if (id === 'publications') return { x: Math.round(W * 0.25), y: 60 };
  if (id === 'contact')      return { x: Math.round(W * 0.42), y: 70 };
  return { x: 100, y: 80 };
}

/* ── VIEWPORT ROUTING ─── */
function useViewport() {
  const [vp, setVp] = useState(() => {
    const w = window.innerWidth;
    if (w < 768) return 'mobile';
    if (w < 1100) return 'tablet';
    return 'desktop';
  });
  useEffect(() => {
    const fn = () => {
      const w = window.innerWidth;
      const next = w < 768 ? 'mobile' : w < 1100 ? 'tablet' : 'desktop';
      setVp(next);
    };
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  useEffect(() => {
    document.body.classList.remove('viewport-desktop','viewport-tablet','viewport-mobile');
    document.body.classList.add('viewport-' + vp);
  }, [vp]);
  return vp;
}

function DesktopApp() {
  const [tweaks, setTweaks] = useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('is_tw2') || '{}') }; }
    catch { return TWEAK_DEFAULTS; }
  });
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [winStates, setWinStates] = useState({ terminal:'open', publications:'closed', contact:'closed' });
  const [zTop, setZTop] = useState(100);
  const [zMap, setZMap] = useState({ terminal:100, publications:99, contact:98 });

  const bringToFront = useCallback((id) => {
    setZTop(z => { const n = z + 1; setZMap(m => ({ ...m, [id]: n })); return n; });
  }, []);

  const openWindow = useCallback((id) => {
    setWinStates(s => ({ ...s, [id]: 'open' }));
    setTimeout(() => bringToFront(id), 10);
  }, [bringToFront]);

  const restoreWindow = useCallback((id) => {
    setWinStates(s => ({ ...s, [id]: 'restoring' }));
    setTimeout(() => { setWinStates(s => ({ ...s, [id]: 'open' })); bringToFront(id); }, 500);
  }, [bringToFront]);

  const minimizeWindow = useCallback((id, mode) => {
    if (mode === 'start') {
      setWinStates(s => ({ ...s, [id]: 'minimizing' }));
    } else {
      setWinStates(s => ({ ...s, [id]: 'docked' }));
    }
  }, []);

  const closeWindow = useCallback((id) => {
    setWinStates(s => ({ ...s, [id]: 'closed' }));
  }, []);

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accent);
  }, [tweaks.accent]);

  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => { localStorage.setItem('is_tw2', JSON.stringify(tweaks)); }, [tweaks]);

  const CONTENT = { terminal: <TerminalContent/>, publications: <PublicationsContent/>, contact: <ContactContent/> };

  return (
    <>
      <DesktopBg/>
      <MenuBar winStates={winStates} onOpen={openWindow} onFocus={bringToFront}/>

      {Object.keys(WIN_CONFIGS).map(id => {
        const cfg = WIN_CONFIGS[id];
        const { x, y } = getInitPos(id);
        const state = winStates[id] || 'closed';
        if (state === 'closed') return null;
        return (
          <Window key={id} id={id}
            title={cfg.title} subtitle={cfg.subtitle}
            width={cfg.width} height={cfg.height}
            initX={x} initY={y + 28}
            zIndex={zMap[id] || 50}
            isTerminal={cfg.isTerminal}
            genieState={state}
            onFocus={() => bringToFront(id)}
            onClose={() => closeWindow(id)}
            onDocked={(wid, mode) => minimizeWindow(wid, mode)}
          >{CONTENT[id]}</Window>
        );
      })}

      <Dock
        winStates={winStates}
        onOpen={openWindow}
        onFocus={bringToFront}
        onRestore={restoreWindow}
      />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

function App() {
  const vp = useViewport();
  if (vp === 'mobile') return <MobileApp/>;
  if (vp === 'tablet') return <TabletApp/>;
  return <DesktopApp/>;
}
</script>
</body>
</html>
